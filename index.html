<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>殷望 - 靈修小角</title>
    
    <!-- External libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
    <div class="container">
      <!-- Image Banner (No Link) -->
      <div class="image-banner">
        <img src="https://raw.githubusercontent.com/lpwlee/yanmon-qtcorner/refs/heads/main/images/QuietTime-Banner.jpg" 
             alt="殷望 - 靈修小角 Banner" 
             class="banner-image">
      </div>
      
      <h1>📖 殷望 - 靈修小角</h1>
      
      <div class="calendar-container">
        <input type="text" id="datePicker" class="date-input" placeholder="選擇日期" />
        <button id="fetchButton" class="fetch-button">📅 載入靈修</button>
      </div>
      
      <!-- Font Size Controls -->
      <div class="font-size-controls">
        <span class="font-size-label">字體大小：</span>
        <button id="decreaseFont" class="font-btn" title="縮小字體">A−</button>
        <span id="fontSizeDisplay" class="font-size-display">100%</span>
        <button id="increaseFont" class="font-btn" title="放大字體">A+</button>
        <button id="resetFont" class="font-btn reset-btn" title="重設字體">↺</button>
      </div>
      
      <div id="dataDisplay" class="data-display">
        <div class="no-data">選擇日期並點擊按鈕查看每日靈修</div>
      </div>
    </div>

    <script src="scripts/script.js"></script>
  </body>
</html>
