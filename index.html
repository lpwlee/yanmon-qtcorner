<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Devotional Reader</title>
    
    <!-- External libraries - order matters! -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
    <div class="container">
      <h1>📖 殷望 - 靈修小角</h1>
      
      <div class="calendar-container">
        <input type="text" id="datePicker" class="date-input" placeholder="Select a date" />
        <button id="fetchButton" class="fetch-button">📅 載入靈修</button>
      </div>
      
      <div id="dataDisplay" class="data-display">
        <div class="no-data">Select a date and click the button to view the devotional</div>
      </div>
    </div>

    <script src="scripts/script.js"></script>
  </body>
</html>
